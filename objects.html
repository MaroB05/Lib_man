<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4efe6;
            --panel: #fffaf2;
            --ink: #1f2937;
            --muted: #6b7280;
            --accent: #8b5e34;
            --accent-strong: #6f4422;
            --border: #e7dcc9;
            --shadow: 0 18px 40px rgba(82, 55, 28, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #f8f1e7, #ede4d5 55%, #f7f3ec);
            color: var(--ink);
        }

        .page {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 20px 48px;
        }

        .hero {
            background: rgba(255, 250, 242, 0.88);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 28px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .hero h1 {
            margin: 0 0 8px;
            font-size: clamp(2rem, 4vw, 3rem);
        }

        .hero p {
            margin: 0;
            color: var(--muted);
            max-width: 720px;
            line-height: 1.6;
        }

        .layout {
            display: grid;
            gap: 20px;
            grid-template-columns: 1fr 1.2fr;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 20px;
        }

        .card h2 {
            margin: 0 0 16px;
            font-size: 1.25rem;
        }

        .field-grid {
            display: grid;
            gap: 12px;
        }

        label {
            display: grid;
            gap: 6px;
            font-size: 0.95rem;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d9cab7;
            border-radius: 12px;
            font: inherit;
            background: #fff;
            color: var(--ink);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 16px;
        }

        button {
            border: 0;
            border-radius: 999px;
            padding: 12px 18px;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        .primary {
            background: var(--accent);
            color: white;
        }

        .primary:hover {
            background: var(--accent-strong);
        }

        .secondary {
            background: #eadfcf;
            color: var(--ink);
        }

        .secondary:hover {
            background: #dcc7ae;
        }

        .books-header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
        }

        .books-header p {
            margin: 0;
            color: var(--muted);
        }

        .book-list {
            display: grid;
            gap: 12px;
            max-height: 520px;
            overflow-y: auto;
            padding-right: 6px;
        }

        .book {
            border: 1px solid #eadfce;
            background: white;
            border-radius: 16px;
            padding: 16px;
        }

        .book h3 {
            margin: 0 0 8px;
            font-size: 1.05rem;
        }

        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            background: #f2e8db;
            color: #6a4b2d;
            font-weight: 700;
        }

        .note {
            margin-top: 10px;
            color: var(--muted);
            font-size: 0.92rem;
        }

        @media (max-width: 860px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <section class="hero">
            <h1>Library Management System</h1>
            <p>Add books, filter by author, genre, or rating, and sort the library by title or publication date.</p>
        </section>

        <div class="layout">
            <section class="card">
                <h2>Add a Book</h2>
                <form id="bookForm" class="field-grid">
                    <label>
                        Title
                        <input id="title" type="text" placeholder="Enter book title" required>
                    </label>
                    <label>
                        Author
                        <input id="author" type="text" placeholder="Enter author name" required>
                    </label>
                    <label>
                        Genre
                        <input id="genre" type="text" placeholder="Enter genre" required>
                    </label>
                    <label>
                        Rating
                        <input id="rating" type="number" min="0" max="5" step="0.1" placeholder="0 to 5" required>
                    </label>
                    <label>
                        Publication Date
                        <input id="publicationDate" type="date" required>
                    </label>

                    <div class="actions">
                        <button class="primary" type="submit" id="submitbtn">Add Book</button>
                        <button class="secondary" type="button" id="clear">Clear</button>
                        <button class="secondary" type="button" id="render">show all</button>
                        <button class="secondary" type="button" id="applyFilterButton">Apply Filter</button>
                        <button class="secondary" type="button" id="sortTitleButton">Sort by Title</button>
                        <button class="secondary" type="button" id="sortDateButton">Sort by Publication Date</button>
                    </div>

                    <div class="note">
                        Filter uses the current Author, Genre, and Rating fields. Leave a field blank to ignore it.
                    </div>
                </form>
            </section>

            <section class="card">
                <div class="books-header">
                    <div>
                        <h2>Book Collection</h2>
                        <p id="bookCount"></p>
                    </div>
                </div>

                <div id="bookList" class="book-list"></div>
            </section>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
